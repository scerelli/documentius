name: Release

# ── Trigger ───────────────────────────────────────────────────────────────────
# Manual from GitHub UI — just press Run, no fields to fill.
# Optional: force a specific version or arch (leave blank for auto).
on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Force version  (leave empty = auto from commits)"
        required: false
        default: ""
      arch:
        description: "Wheel architecture"
        required: false
        default: "x86_64"
        type: choice
        options: [x86_64, aarch64]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FLATHUB_TOKEN: ${{ secrets.FLATHUB_TOKEN }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for git log / git describe
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Auto-version + update pyproject / metainfo / manifest ─────────────
      - name: Prepare release
        id: prep
        run: |
          ARGS="${{ github.repository }}"
          ARGS="$ARGS --arch ${{ inputs.arch }}"
          [[ -n "${{ inputs.version_override }}" ]] && \
            ARGS="$ARGS --version ${{ inputs.version_override }}"

          OUTPUT=$(python3 scripts/prepare_release.py $ARGS)
          echo "$OUTPUT"

          VERSION=$(echo "$OUTPUT" | grep '^VERSION=' | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 3. Commit and tag ─────────────────────────────────────────────────────
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml packaging/
          git commit -m "chore: release v${{ steps.prep.outputs.version }}"
          git tag "v${{ steps.prep.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --tags

      # ── 4. Build source tarball ───────────────────────────────────────────────
      - name: Build tarball
        id: tarball
        run: |
          VER="${{ steps.prep.outputs.version }}"
          ARCHIVE="documentius-${VER}.tar.gz"
          git archive \
            --format=tar.gz \
            --prefix="documentius-${VER}/" \
            -o "$ARCHIVE" \
            HEAD
          SHA256=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"

      # ── 5. Patch the real tarball sha256 into the manifest ────────────────────
      - name: Patch tarball sha256
        run: |
          python3 - <<'EOF'
          import json, pathlib
          sha = "${{ steps.tarball.outputs.sha256 }}"
          p = pathlib.Path("packaging/flatpak/flathub-manifest.json")
          m = json.loads(p.read_text())
          for mod in m["modules"]:
              for src in mod.get("sources", []):
                  if src.get("sha256") == "COMPUTED_BY_CI":
                      src["sha256"] = sha
          p.write_text(json.dumps(m, indent=2) + "\n")
          print(f"sha256 patched: {sha}")
          EOF

      # ── 6. GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.prep.outputs.version }}"
          name: "Documentius v${{ steps.prep.outputs.version }}"
          generate_release_notes: true
          files: |
            ${{ steps.tarball.outputs.archive }}
            packaging/flatpak/flathub-manifest.json
          body: |
            ## Tarball SHA-256
            ```
            ${{ steps.tarball.outputs.sha256 }}  ${{ steps.tarball.outputs.archive }}
            ```

            ## Flathub
            `flathub-manifest.json` is attached — copy it into your Flathub repo to publish.

      # ── 7. Push to Flathub repo (runs only if secret is configured) ───────────
      - name: Push manifest to Flathub repo
        if: env.FLATHUB_TOKEN != ''
        env:
          FLATHUB_REPO: ${{ vars.FLATHUB_REPO }}
        run: |
          APP_ID=$(basename "$FLATHUB_REPO")
          git clone \
            "https://x-access-token:${FLATHUB_TOKEN}@github.com/${FLATHUB_REPO}.git" \
            flathub-repo
          cp packaging/flatpak/flathub-manifest.json \
             "flathub-repo/${APP_ID}.json"
          cd flathub-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${APP_ID}.json"
          git commit -m "Update to v${{ steps.prep.outputs.version }}"
          git push
