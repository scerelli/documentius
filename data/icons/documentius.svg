<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background: dark rounded square -->
  <rect width="512" height="512" rx="104" fill="#111827"/>

  <!-- Document body (white), top-right corner folded -->
  <path d="M138 88 L322 88 L374 140 L374 424 L138 424 Z" fill="white"/>

  <!-- Fold shadow: shows depth on the ear -->
  <path d="M322 88 L322 140 L374 140 Z" fill="#9BAFC7"/>

  <!-- Text lines (dark, subtle — suggest printed content) -->
  <rect x="168" y="190" width="166" height="11" rx="5.5" fill="#111827" opacity="0.18"/>
  <rect x="168" y="220" width="148" height="11" rx="5.5" fill="#111827" opacity="0.18"/>
  <rect x="168" y="250" width="106" height="11" rx="5.5" fill="#111827" opacity="0.18"/>

  <!-- Signature wave -->
  <path d="M168 335
           C 192 308, 214 360, 252 335
           C 280 314, 302 356, 334 335"
        fill="none"
        stroke="#111827"
        stroke-width="13"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>
